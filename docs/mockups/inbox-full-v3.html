<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<title>Inbox · volledige 3-paneel preview</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: 38 35% 55%;
    --gold-deep: 32 42% 42%;
    --gold-soft: 38 45% 92%;
    --ink: 0 0% 10%;
    --page-bg: 30 10% 96%;
  }
  html, body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', system-ui, sans-serif;
    background:
      radial-gradient(ellipse 1400px 600px at 50% -220px, hsl(var(--gold-soft) / 0.5), transparent 60%),
      hsl(var(--page-bg));
    background-attachment: fixed;
    color: hsl(var(--ink));
    -webkit-font-smoothing: antialiased;
    height: 100vh;
    overflow: hidden;
  }

  .ribbon {
    height: 28px;
    background: hsl(0 0% 5%);
    color: hsl(0 0% 85%);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .ribbon .tag { color: hsl(var(--gold)); font-weight: 600; }

  .app-wrap {
    height: calc(100vh - 28px);
    padding: 18px 22px;
    box-sizing: border-box;
  }
  .app {
    height: 100%;
    display: grid;
    grid-template-columns: 380px 1fr 460px;
    background: hsl(0 0% 100%);
    border: 1px solid hsl(var(--gold) / 0.22);
    border-radius: 14px;
    box-shadow:
      inset 0 1px 0 hsl(0 0% 100%),
      0 1px 2px hsl(var(--ink) / 0.04),
      0 12px 32px -14px hsl(var(--ink) / 0.18);
    overflow: hidden;
    position: relative;
  }
  .app::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, hsl(var(--gold) / 0.45), transparent);
    pointer-events: none;
    z-index: 2;
  }
  @media (max-width: 1500px) {
    .app { grid-template-columns: 360px 1fr 440px; }
    .app-wrap { padding: 16px 18px; }
  }
  @media (max-width: 1300px) {
    .app { grid-template-columns: 340px 1fr 420px; }
    .app-wrap { padding: 14px 16px; }
  }
  @media (max-width: 1100px) {
    .app { grid-template-columns: 320px 1fr 400px; }
    .app-wrap { padding: 12px 14px; }
  }

  .pane {
    height: 100%;
    overflow: hidden;
    position: relative;
  }
  .pane + .pane {
    border-left: 1px solid hsl(var(--gold) / 0.18);
  }
  .pane iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: transparent;
  }
</style>
</head>
<body>

<div class="ribbon">
  <span><span class="tag">Mockup</span> &nbsp; Inbox · volledige 3-paneel preview</span>
  <span style="opacity:0.4; letter-spacing:0;">docs/mockups/inbox-full-v3.html</span>
</div>

<div class="app-wrap">
  <div class="app">
    <div class="pane"><iframe id="pane-left" title="Inbox-lijst"></iframe></div>
    <div class="pane"><iframe id="pane-middle" title="E-mail bron"></iframe></div>
    <div class="pane"><iframe id="pane-right" title="Order review"></iframe></div>
  </div>
</div>

<script>
  // Cache-buster — forceert verse load van iframes bij elke page-refresh
  const v = Date.now();
  const middle = document.getElementById('pane-middle');
  const right  = document.getElementById('pane-right');
  document.getElementById('pane-left').src = `inbox-left-v3.html?embed=1&v=${v}`;
  middle.src = `inbox-middle-v3.html?embed=1&v=${v}`;
  right.src  = `inbox-review-v3.html?embed=1&v=${v}`;

  // Forward linkage-berichten tussen middle en right iframe
  window.addEventListener('message', (e) => {
    if (!e.data || !e.data.type) return;
    console.log('[full] msg:', e.data);
    if (e.data.type === 'highlight-field') {
      right?.contentWindow?.postMessage(e.data, '*');
    } else if (e.data.type === 'highlight-source') {
      middle?.contentWindow?.postMessage(e.data, '*');
    }
  });
</script>

<script>
  // Forward linkage-berichten tussen middle en right iframe
  const middle = document.getElementById('pane-middle');
  const right  = document.getElementById('pane-right');
  window.addEventListener('message', (e) => {
    if (!e.data || !e.data.type) return;
    if (e.data.type === 'highlight-field') {
      // Komt van middle → stuur naar right
      right?.contentWindow?.postMessage(e.data, '*');
    } else if (e.data.type === 'highlight-source') {
      // Komt van right → stuur naar middle
      middle?.contentWindow?.postMessage(e.data, '*');
    }
  });
</script>

</body>
</html>
