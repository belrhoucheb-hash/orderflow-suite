name: E2E Tests
# Handmatig te starten via Actions-tab. Push/PR-triggers staan uit zolang
# secrets (E2E_USER_EMAIL/PASSWORD + VITE_SUPABASE_*) nog niet ingesteld zijn;
# zonder die waarden kan de webserver niet booten en timeouten alle tests.
on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
        env:
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
