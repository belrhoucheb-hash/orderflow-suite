name: Nightly Performance and Security
# Zware lagen die niet per PR draaien:
#   - Vitest benchmarks (algoritmische regressie-detectie)
#   - Lighthouse CI tegen production-build (LCP, TBT, CLS budgetten)
#   - k6 load-test tegen api-v1 (alleen als secrets gezet zijn)
#
# Trigger: dagelijks om 03:00 UTC, of handmatig.
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Vitest benchmarks
        run: npm run test:bench -- --reporter=verbose
      - name: Upload bench output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: |
            .vitest-bench/
            *.bench.json

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run build
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x
      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/

  load:
    # Alleen draaien als er een staging-token beschikbaar is.
    # Configureer secrets API_BASE_URL en API_TOKEN op repo niveau.
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
      - name: Run k6 load-test
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN_STAGING }}
        run: k6 run --quiet tests/load/api-v1-orders.js
